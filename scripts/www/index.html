<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>文学少女维希莱妮 v.1.00</title>
  <link rel="manifest" href="/manifest.json">  <style>
        :root {
            --bg-primary: #0d1117;
            --bg-secondary: #161b22;
            --bg-tertiary: #21262d;
            --bg-input: #0d1117;
            --border-color: #30363d;
            --text-primary: #e6edf3;
            --text-secondary: #8b949e;
            --text-muted: #6e7681;
            --accent: #58a6ff;
            --accent-hover: #79c0ff;
            --accent-light: rgba(88, 166, 255, 0.15);
            --danger: #f85149;
            --success: #3fb950;
            --warning: #d29922;
            --radius-sm: 6px;
            --radius-md: 8px;
            --radius-lg: 12px;
            --shadow: 0 2px 8px rgba(0, 0, 0, 0.3);
            --transition: 0.2s ease;
            --font-mono: 'SF Mono', 'Fira Code', 'Consolas', monospace;
            --font-sans: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
        }

        * { box-sizing: border-box; margin: 0; padding: 0; }
        body {
            background: var(--bg-primary);
            color: var(--text-primary);
            font-family: var(--font-sans);
            line-height: 1.6;
            min-height: 100vh;
            overflow-x: hidden;
            display: flex;
            flex-direction: column;
        }

        .header {
            background: var(--bg-secondary);
            border-bottom: 1px solid var(--border-color);
            padding: 12px 16px;
            display: flex;
            align-items: center;
            justify-content: space-between;
            flex-wrap: wrap;
            gap: 8px;
            position: sticky;
            top: 0;
            z-index: 100;
            backdrop-filter: blur(12px);
        }
        .header-brand {
            font-size: 1rem;
            font-weight: 700;
            color: var(--accent);
            letter-spacing: 0.02em;
            white-space: nowrap;
        }
        .header-actions { display: flex; gap: 6px; align-items: center; flex-wrap: wrap; }

        .mode-tabs {
            display: flex;
            gap: 4px;
            background: var(--bg-tertiary);
            border-radius: var(--radius-md);
            padding: 3px;
        }
        .mode-tab {
            padding: 6px 12px;
            border-radius: var(--radius-sm);
            border: none;
            background: transparent;
            color: var(--text-secondary);
            cursor: pointer;
            font-size: 0.8rem;
            font-weight: 500;
            transition: var(--transition);
            white-space: nowrap;
        }
        .mode-tab:hover { color: var(--text-primary); background: var(--bg-primary); }
        .mode-tab.active { background: var(--accent); color: #fff; }

        .main-container {
            flex: 1;
            max-width: 100%;
            margin: 0 auto;
            padding: 16px;
            display: flex;
            flex-direction: column;
            gap: 16px;
        }

        .card {
            background: var(--bg-secondary);
            border: 1px solid var(--border-color);
            border-radius: var(--radius-lg);
            padding: 16px;
            box-shadow: var(--shadow);
        }
        .card.collapsed .card-body { display: none; }
        .card-header {
            display: flex;
            align-items: center;
            justify-content: space-between;
            margin-bottom: 12px;
            flex-wrap: wrap;
            gap: 6px;
            cursor: pointer;
            user-select: none;
        }
        .card-title { font-size: 0.9rem; font-weight: 600; color: var(--text-primary); }
        .collapse-btn {
            font-size: 1.1rem;
            color: var(--text-muted);
            transition: transform 0.2s ease;
        }
        .card:not(.collapsed) .collapse-btn { transform: rotate(90deg); }

        .form-group { margin-bottom: 10px; }
        .form-label {
            display: block;
            font-size: 0.75rem;
            font-weight: 500;
            color: var(--text-secondary);
            margin-bottom: 4px;
            text-transform: uppercase;
            letter-spacing: 0.04em;
        }
        .form-input, .form-textarea, .form-select {
            width: 100%;
            padding: 10px 12px;
            background: var(--bg-input);
            border: 1px solid var(--border-color);
            border-radius: var(--radius-sm);
            color: var(--text-primary);
            font-family: var(--font-sans);
            font-size: 0.85rem;
            transition: var(--transition);
            resize: vertical;
            max-width: 100%;
        }
        .form-input:focus, .form-textarea:focus, .form-select:focus {
            outline: none;
            border-color: var(--accent);
            box-shadow: 0 0 0 2px var(--accent-light);
        }
        .form-textarea { min-height: 100px; font-family: var(--font-mono); font-size: 0.8rem; }
        .form-textarea.tall { min-height: 150px; }

        .btn {
            padding: 7px 14px;
            border-radius: var(--radius-sm);
            border: 1px solid var(--border-color);
            font-size: 0.8rem;
            font-weight: 500;
            cursor: pointer;
            transition: var(--transition);
            white-space: nowrap;
            display: inline-flex;
            align-items: center;
            gap: 5px;
            text-decoration: none;
        }
        .btn-primary { background: var(--accent); color: #fff; border-color: var(--accent); }
        .btn-primary:hover { background: var(--accent-hover); }
        .btn-secondary { background: var(--bg-tertiary); color: var(--text-primary); }
        .btn-secondary:hover { background: var(--border-color); }
        .btn-danger { background: transparent; color: var(--danger); border-color: var(--danger); }
        .btn-danger:hover { background: rgba(248, 81, 73, 0.15); }
        .btn-success { background: var(--success); color: #fff; border-color: var(--success); }
        .btn-sm { padding: 4px 8px; font-size: 0.7rem; }
        .btn:disabled { opacity: 0.5; cursor: not-allowed; }
        .api-link {
            color: var(--accent);
            text-decoration: underline;
            font-size: 0.75rem;
            margin-left: 6px;
            white-space: nowrap;
        }

        .content-box {
            position: relative;
            background: var(--bg-input);
            border: 1px solid var(--border-color);
            border-radius: var(--radius-md);
            padding: 12px;
            max-height: 300px;
            overflow-y: auto;
            font-family: var(--font-mono);
            font-size: 0.8rem;
            line-height: 1.6;
            white-space: pre-wrap;
            word-break: break-word;
            margin-top: 8px;
        }
        .content-box br { margin: 0; line-height: inherit; }
        .content-toolbar-external {
            display: flex;
            align-items: center;
            justify-content: space-between;
            gap: 8px;
            margin-top: 8px;
            flex-wrap: wrap;
        }
        .token-info {
            font-size: 0.65rem;
            color: var(--text-muted);
            font-family: var(--font-mono);
        }

        .chapter-item {
            background: var(--bg-tertiary);
            border: 1px solid var(--border-color);
            border-radius: var(--radius-md);
            padding: 12px;
            margin-bottom: 8px;
        }
        .chapter-header { display: flex; align-items: center; justify-content: space-between; margin-bottom: 8px; gap: 6px; }
        .chapter-number { font-weight: 700; color: var(--accent); font-size: 0.85rem; white-space: nowrap; }
        .chapter-actions { display: flex; gap: 3px; }

        .character-card {
            background: var(--bg-tertiary);
            border: 1px solid var(--border-color);
            border-radius: var(--radius-md);
            padding: 10px;
            margin-bottom: 6px;
            cursor: pointer;
            transition: var(--transition);
            display: flex;
            align-items: center;
            gap: 8px;
        }
        .character-card:hover { border-color: var(--accent); }
        .character-card.selected { border-color: var(--accent); background: var(--accent-light); }
        .character-card-header { flex: 1; display: flex; align-items: center; gap: 8px; }
        .character-name { font-weight: 600; font-size: 0.85rem; }
        .character-checkbox { accent-color: var(--accent); }
        .chat-area {
            background: var(--bg-input);
            border: 1px solid var(--border-color);
            border-radius: var(--radius-md);
            padding: 12px;
            max-height: 300px;
            overflow-y: auto;
            margin-top: 8px;
        }
        .chat-msg { margin-bottom: 6px; line-height: 1.6; }
        .chat-speaker { font-weight: 700; color: var(--accent); }
        .chat-input-row {
            display: flex;
            gap: 6px;
            margin-top: 8px;
        }
        .chat-input-row .form-input { flex: 1; }

        .preview-section {
            background: #ffffff;
            border: 1px solid #d0d7de;
            border-radius: var(--radius-lg);
            padding: 24px;
            color: #1f2328;
            font-family: var(--font-sans);
            font-size: 0.9rem;
            line-height: 1.7;
            max-height: 400px;
            overflow-y: auto;
            box-shadow: 0 1px 4px rgba(0, 0, 0, 0.08);
        }
        .preview-label {
            font-size: 0.7rem;
            color: #656d76;
            text-transform: uppercase;
            letter-spacing: 0.05em;
            margin-bottom: 10px;
            padding-bottom: 6px;
            border-bottom: 1px solid #d0d7de;
        }

        .modal-overlay {
            position: fixed;
            top: 0; left: 0; right: 0; bottom: 0;
            background: rgba(0, 0, 0, 0.7);
            display: flex;
            align-items: center;
            justify-content: center;
            z-index: 1000;
        }
        .modal {
            background: var(--bg-secondary);
            border: 1px solid var(--border-color);
            border-radius: var(--radius-lg);
            padding: 24px;
            max-width: 90%;
            width: 400px;
            box-shadow: 0 8px 32px rgba(0, 0, 0, 0.5);
        }
        .modal h3 { margin-bottom: 12px; color: var(--accent); font-size: 1rem; }

        .chat-fullscreen {
            position: fixed;
            top: 0; left: 0; right: 0; bottom: 0;
            background: var(--bg-primary);
            z-index: 200;
            display: flex;
            flex-direction: column;
        }
        .chat-fullscreen-header {
            background: var(--bg-secondary);
            border-bottom: 1px solid var(--border-color);
            padding: 12px 16px;
            display: flex;
            align-items: center;
            gap: 12px;
            height: 56px;
            flex-shrink: 0;
        }
        .chat-fullscreen-header .back-btn {
            background: transparent;
            border: none;
            color: var(--accent);
            font-size: 1.2rem;
            cursor: pointer;
            padding: 4px;
        }
        .chat-fullscreen-header .title {
            font-weight: 600;
            font-size: 1rem;
            color: var(--text-primary);
        }
        .chat-fullscreen-body {
            flex: 1;
            overflow-y: auto;
            padding: 16px;
            display: flex;
            flex-direction: column;
            gap: 8px;
        }
        .chat-fullscreen-footer {
            background: var(--bg-secondary);
            border-top: 1px solid var(--border-color);
            padding: 10px 16px;
            display: flex;
            gap: 8px;
            align-items: center;
            flex-shrink: 0;
        }
        .chat-fullscreen-footer .form-input {
            flex: 1;
            background: var(--bg-input);
            border: 1px solid var(--border-color);
            border-radius: 20px;
            padding: 10px 16px;
            font-size: 0.9rem;
        }
        .chat-fullscreen-footer .send-btn {
            background: var(--accent);
            color: #fff;
            border: none;
            border-radius: 20px;
            padding: 10px 20px;
            font-size: 0.9rem;
            cursor: pointer;
        }

        .doc-list-item {
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 5px 0;
            border-bottom: 1px solid var(--border-color);
            font-size: 0.75rem;
        }
        .doc-list-item:last-child { border-bottom: none; }

        .footer-note {
            text-align: center;
            padding: 20px 16px;
            font-size: 0.7rem;
            color: var(--text-muted);
            line-height: 1.6;
        }

        ::-webkit-scrollbar { width: 4px; }
        ::-webkit-scrollbar-track { background: transparent; }
        ::-webkit-scrollbar-thumb { background: var(--border-color); border-radius: 2px; }
        ::-webkit-scrollbar-thumb:hover { background: var(--text-muted); }

        @media (max-width: 768px) {
            .header { padding: 10px 12px; }
            .main-container { padding: 10px; }
            .mode-tabs { width: 100%; overflow-x: auto; }
            .card { padding: 12px; }
            .btn { padding: 6px 10px; font-size: 0.75rem; }
        }
    </style>
</head>
<body>

    <header class="header">
        <span class="header-brand" id="headerTitle">🧰 文学少女维希莱妮 v.1.00</span>
        <div class="header-actions">
            <div class="mode-tabs" id="modeTabs">
                <button class="mode-tab active" data-mode="longtext">📝 长文本</button>
                <button class="mode-tab" data-mode="novel">📖 小说</button>
                <button class="mode-tab" data-mode="chat">💬 对话</button>
            </div>
            <button class="btn btn-secondary btn-sm" onclick="openSaveProfileModal()">💾 保存</button>
            <button class="btn btn-secondary btn-sm" onclick="openLoadProfileModal()">📂 方案</button>
        </div>
    </header>

    <div class="main-container" id="mainContainer"></div>

    <div class="footer-note">
        内容由AI生产，请仔细甄别<br>如有问题请联系475411492@qq.com
    </div>

    <div id="modalContainer"></div>
    <div id="chatFullscreenContainer"></div>

    <script>
        (function() {
            const STORAGE_KEY = 'deepseek_tool_state_v10';
            const PROFILES_KEY = 'deepseek_tool_profiles_v10';

            const state = {
                currentMode: 'longtext',
                currentModel: 'deepseek-v4-pro',
                maxTokens: 256000,
                apiKey: '',
                systemPromptLongtext: '',
                systemPromptNovel: '',
                systemPromptChat: '',
                longtextUserPrompt: '',
                longtextResult: '',
                novelTitle: '',
                novelChapters: [],
                chatCharacters: [],
                chatSelectedCharacterIndices: [],
                chatHistory: [],
                chatContextCount: 5,
                chatUserInput: '',
                chatUserName: '用户',
                collapsedCards: { api: false, mode: false, preview: false },
                importedDocs: [],
                chatFullscreen: false
            };

            function getCurrentSystemPrompt() {
                switch (state.currentMode) {
                    case 'longtext': return state.systemPromptLongtext;
                    case 'novel': return state.systemPromptNovel;
                    case 'chat': return state.systemPromptChat;
                    default: return '';
                }
            }
            function setCurrentSystemPrompt(value) {
                switch (state.currentMode) {
                    case 'longtext': state.systemPromptLongtext = value; break;
                    case 'novel': state.systemPromptNovel = value; break;
                    case 'chat': state.systemPromptChat = value; break;
                }
            }

            function saveState() { localStorage.setItem(STORAGE_KEY, JSON.stringify(state)); }
            function loadState() {
                const raw = localStorage.getItem(STORAGE_KEY);
                if (!raw) return;
                try {
                    const saved = JSON.parse(raw);
                    Object.keys(saved).forEach(key => { if (key in state) state[key] = saved[key]; });
                    if (saved.chatHistory) saved.chatHistory.forEach(m => { if (!m.role) m.role = (m.speaker === state.chatUserName) ? 'user' : 'assistant'; });
                    if (!state.currentModel) state.currentModel = 'deepseek-v4-pro';
                    if (!state.maxTokens) state.maxTokens = 256000;
                    if (!state.collapsedCards) state.collapsedCards = { api: false, mode: false, preview: false };
                    if (!state.chatUserName) state.chatUserName = '用户';
                    if (!state.importedDocs) state.importedDocs = [];
                    if (!state.chatSelectedCharacterIndices) state.chatSelectedCharacterIndices = [];
                    if (state.chatFullscreen === undefined) state.chatFullscreen = false;
                    state.novelChapters.forEach(ch => { if (!ch.content) ch.content = ''; });
                    if (state.chatCharacters) state.chatCharacters.forEach(c => {
                        if (!c.description && (c.identity || c.personality || c.speechStyle)) c.description = [c.identity, c.personality, c.speechStyle].filter(Boolean).join('\n');
                    });
                } catch (e) { console.warn('状态加载失败'); }
            }

            function saveProfiles(profiles) { localStorage.setItem(PROFILES_KEY, JSON.stringify(profiles)); }
            function loadProfiles() { return JSON.parse(localStorage.getItem(PROFILES_KEY) || '[]'); }

            function estimateTokens(text) {
                if (!text) return 0;
                const cjk = (text.match(/[\u4e00-\u9fff\u3400-\u4dbf\uf900-\ufaff\u3040-\u309f\u30a0-\u30ff\uac00-\ud7af]/g) || []).length * 2;
                const nonCjk = text.replace(/[\u4e00-\u9fff\u3400-\u4dbf\uf900-\ufaff\u3040-\u309f\u30a0-\u30ff\uac00-\ud7af]/g, ' ');
                const words = nonCjk.trim().split(/\s+/).filter(w => w.length > 0).length;
                return Math.max(1, cjk + Math.round(words * 1.33));
            }

            function copyText(text) {
                if (!text) return;
                if (navigator.clipboard && window.isSecureContext) {
                    navigator.clipboard.writeText(text).then(() => alert('已复制')).catch(() => fallbackCopy(text));
                } else fallbackCopy(text);
            }
            function fallbackCopy(text) {
                const ta = document.createElement('textarea');
                ta.value = text; ta.style.position = 'fixed'; ta.style.left = '-9999px';
                document.body.appendChild(ta); ta.select();
                try { document.execCommand('copy'); alert('已复制'); } catch (e) { alert('复制失败'); }
                document.body.removeChild(ta);
            }

            function formatText(text) { return escapeHtml(text).replace(/\n+/g, '<br>'); }
            function escapeHtml(s) { return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;'); }
            function scrollToBottom(el) { if (el) setTimeout(() => { el.scrollTop = el.scrollHeight; }, 10); }

            // ==================== 键盘避让（WebView 兼容方案） ====================
            function setupKeyboardHandler() {
                const handleFocus = (e) => {
                    const target = e.target;
                    if (!target || (target.id !== 'chatUserInput' && target.id !== 'fullscreenChatInput')) return;
                    setTimeout(() => {
                        target.scrollIntoView({ behavior: 'smooth', block: 'center' });
                    }, 300);
                };
                document.addEventListener('focusin', handleFocus);
                window._keyboardHandlerCleanup = () => {
                    document.removeEventListener('focusin', handleFocus);
                };
            }

            // ==================== 渲染入口 ====================
            function renderAll() {
                document.getElementById('headerTitle').textContent = '🧰 文学少女维希莱妮 v.1.00';

                if (state.currentMode === 'chat' && state.chatFullscreen) {
                    renderChatFullscreen();
                    document.getElementById('mainContainer').innerHTML = '';
                    document.getElementById('chatFullscreenContainer').style.display = 'block';
                    setupKeyboardHandler();
                    return;
                }
                document.getElementById('chatFullscreenContainer').style.display = 'none';

                const container = document.getElementById('mainContainer');
                const previewCard = (state.currentMode !== 'chat') ? renderPreviewCard() : '';
                container.innerHTML = renderSettingsCard() + renderModeCard() + previewCard;
                bindEvents();
                document.querySelectorAll('.mode-tab').forEach(t => t.classList.toggle('active', t.dataset.mode === state.currentMode));
                applyCollapseState();
                setupKeyboardHandler();
            }

            function applyCollapseState() {
                document.getElementById('apiSettingsCard')?.classList.toggle('collapsed', state.collapsedCards.api);
                document.getElementById('modeCard')?.classList.toggle('collapsed', state.collapsedCards.mode);
                const previewCard = document.getElementById('previewCard');
                if (previewCard) previewCard.classList.toggle('collapsed', state.collapsedCards.preview);
            }

            // ==================== 卡片渲染 ====================
            function renderSettingsCard() {
                const sysPrompt = getCurrentSystemPrompt();
                let docsHtml = state.importedDocs.length
                    ? state.importedDocs.map((d,i) => `<div class="doc-list-item"><span>📄 ${escapeHtml(d.name)} (${d.content.length}字)</span><button class="btn btn-sm btn-danger delete-doc-btn" data-index="${i}">✕</button></div>`).join('')
                    : '<div style="font-size:0.75rem; color:var(--text-muted);">暂无文档</div>';
                return `
                <div class="card" id="apiSettingsCard">
                    <div class="card-header" id="apiCardHeader"><span class="card-title">🔑 API 与模型</span><span class="collapse-btn">▶</span></div>
                    <div class="card-body">
                        <div style="display:flex; gap:12px; flex-wrap:wrap;">
                            <div class="form-group" style="flex:1; min-width:180px;">
                                <label class="form-label">API Key <a href="https://platform.deepseek.com/api_keys" target="_blank" class="api-link">🔗 获取</a></label>
                                <input type="password" class="form-input" id="apiKeyInput" value="${escapeHtml(state.apiKey)}" placeholder="sk-...">
                            </div>
                            <div class="form-group" style="flex:1; min-width:150px;">
                                <label class="form-label">模型</label>
                                <select class="form-select" id="modelSelect">
                                    <option value="deepseek-v4-pro" ${state.currentModel==='deepseek-v4-pro'?'selected':''}>V4-Pro</option>
                                    <option value="deepseek-v4-flash" ${state.currentModel==='deepseek-v4-flash'?'selected':''}>V4-Flash</option>
                                    <option value="claude-code" ${state.currentModel==='claude-code'?'selected':''}>Claude Code</option>
                                </select>
                            </div>
                            <div class="form-group" style="flex:1; min-width:130px;">
                                <label class="form-label">最大Token</label>
                                <input type="number" class="form-input" id="maxTokensInput" value="${state.maxTokens}" min="1000" max="256000" step="1000">
                            </div>
                        </div>
                        <div class="form-group">
                            <label class="form-label">系统提示词 (${state.currentMode==='longtext'?'长文本':state.currentMode==='novel'?'小说':'对话'})</label>
                            <textarea class="form-textarea" id="systemPromptInput">${escapeHtml(sysPrompt)}</textarea>
                        </div>
                        <div class="form-group">
                            <label class="form-label">📚 导入语料 (TXT/Word)</label>
                            <div style="display:flex; gap:8px; align-items:center;">
                                <input type="file" id="docFileInput" accept=".txt,.docx" style="display:none;">
                                <button class="btn btn-secondary btn-sm" id="btnImportDoc">📂 选择文件</button>
                                <span style="font-size:0.7rem; color:var(--text-muted);">单文档≤50万字，总计≤100万字</span>
                            </div>
                            <div style="margin-top:6px; background:var(--bg-tertiary); border-radius:var(--radius-sm); padding:6px;" id="importedDocsList">${docsHtml}</div>
                        </div>
                    </div>
                </div>`;
            }

            function renderModeCard() {
                let content = '';
                switch (state.currentMode) {
                    case 'longtext': content = renderLongtextCard(); break;
                    case 'novel': content = renderNovelCard(); break;
                    case 'chat': content = renderChatCard(); break;
                }
                return `
                <div class="card" id="modeCard">
                    <div class="card-header" id="modeCardHeader"><span class="card-title">${state.currentMode==='longtext'?'📝 单次长文本':state.currentMode==='novel'?'📖 小说创作':'💬 对话模式'}</span><span class="collapse-btn">▶</span></div>

            // ==================== 全屏聊天界面 ====================
            function renderChatFullscreen() {
                const selectedChars = state.chatSelectedCharacterIndices.map(i => state.chatCharacters[i]).filter(Boolean);
                const title = selectedChars.length ? selectedChars.map(c => c.name).join('、') : '未选择角色';

            function bindFullscreenEvents() {
                document.getElementById('btnCloseFullscreen')?.addEventListener('click', () => {
                    state.chatFullscreen = false;
                    renderAll();
                });
                document.getElementById('btnFullscreenSend')?.addEventListener('click', () => {

                    const text = input.value.trim();
                    if (!text) return;
                    state.chatUserInput = '';
                    input.value = '';
                    sendChatMessageFromFullscreen(text);

                document.getElementById('fullscreenChatInput')?.addEventListener('keydown', e => {
                    if (e.key === 'Enter') document.getElementById('btnFullscreenSend').click();

            async function sendChatMessageFromFullscreen(text) {
                if (state.chatSelectedCharacterIndices.length === 0) return alert('请先选择角色');
                state.chatHistory.push({ speaker: state.chatUserName, text, role: 'user' });
                state.chatUserInput = '';
                saveState();
                await performSendChat();
                renderChatFullscreen();
                const input = document.getElementById('fullscreenChatInput');
                input && setTimeout(() => input.focus(), 50);
            }

            // ==================== 事件绑定 ====================
            function bindEvents() {
                document.querySelectorAll('.mode-tab').forEach(tab => {
                    tab.addEventListener('click', function() {
                        const newMode = this.dataset.mode;
                        if (state.currentMode === newMode) return;
                        const sysInput = document.getElementById('systemPromptInput');
                        if (sysInput) setCurrentSystemPrompt(sysInput.value);
                        state.currentMode = newMode;
                        state.chatFullscreen = false;
                        saveState();
                        renderAll();
                    });
                });

                document.getElementById('apiCardHeader')?.addEventListener('click', () => { state.collapsedCards.api = !state.collapsedCards.api; saveState(); applyCollapseState(); });
                document.getElementById('modeCardHeader')?.addEventListener('click', () => { state.collapsedCards.mode = !state.collapsedCards.mode; saveState(); applyCollapseState(); });
                document.getElementById('previewCardHeader')?.addEventListener('click', () => { state.collapsedCards.preview = !state.collapsedCards.preview; saveState(); applyCollapseState(); });

                document.getElementById('apiKeyInput')?.addEventListener('input', e => { state.apiKey = e.target.value; saveState(); });
                document.getElementById('modelSelect')?.addEventListener('change', e => { state.currentModel = e.target.value; saveState(); });
                document.getElementById('maxTokensInput')?.addEventListener('change', e => {
                    let v = parseInt(e.target.value);
                    if (isNaN(v)) v = 256000;
                    state.maxTokens = Math.min(256000, Math.max(1000, v));
                    e.target.value = state.maxTokens;
                    saveState();
                });
                document.getElementById('systemPromptInput')?.addEventListener('input', e => { setCurrentSystemPrompt(e.target.value); saveState(); });

                document.getElementById('btnImportDoc')?.addEventListener('click', () => document.getElementById('docFileInput').click());
                document.getElementById('docFileInput')?.addEventListener('change', handleFileImport);

                        const idx = parseInt(this.dataset.index);
                        state.importedDocs.splice(idx, 1);

                        renderAll();
                    });

                if (state.currentMode === 'longtext') bindLongtextEvents();
                else if (state.currentMode === 'novel') bindNovelEvents();
                else if (state.currentMode === 'chat') bindChatEvents();
            }

            function bindLongtextEvents() {
                document.getElementById('longtextPromptInput')?.addEventListener('input', e => { state.longtextUserPrompt = e.target.value; });
                document.getElementById('btnLongtextGenerate')?.addEventListener('click', generateLongtext);
                document.getElementById('btnLongtextClear')?.addEventListener('click', () => { state.longtextResult = ''; saveState(); renderAll(); });
                document.getElementById('btnLongtextRegen')?.addEventListener('click', generateLongtext);
                document.getElementById('btnLongtextCopy')?.addEventListener('click', () => copyText(state.longtextResult));
            }

            function bindNovelEvents() {
                document.getElementById('novelTitleInput')?.addEventListener('input', e => { state.novelTitle = e.target.value; saveState(); });

                document.getElementById('btnGenerateAll')?.addEventListener('click', generateAllChapters);

                document.querySelectorAll('.chapter-clear').forEach(b=>b.addEventListener('click',e=>{ state.novelChapters[parseInt(e.target.dataset.index)].content=''; saveState(); renderAll(); }));
                document.querySelectorAll('.chapter-regen').forEach(b=>b.addEventListener('click',e=>generateSingleChapter(parseInt(e.target.dataset.index))));

            function bindChatEvents() {
                document.getElementById('chatUserNameInput')?.addEventListener('input', e => {
                    const newName = e.target.value.trim() || '用户';
                    if (newName !== state.chatUserName) {
                        state.chatHistory.forEach(m => { if (m.role === 'user') m.speaker = newName; });
                        state.chatUserName = newName;
                        saveState();
                        renderAll();
                    }
                });
                document.querySelectorAll('.character-checkbox').forEach(cb => {
                    cb.addEventListener('change', function(e) {
                        const idx = parseInt(this.dataset.index);
                        if (this.checked) {
                            if (!state.chatSelectedCharacterIndices.includes(idx)) state.chatSelectedCharacterIndices.push(idx);
                        } else {
                            state.chatSelectedCharacterIndices = state.chatSelectedCharacterIndices.filter(i => i !== idx);
                        }
                        saveState();
                        renderAll();
                    });
                });
                document.getElementById('btnAddCharacter')?.addEventListener('click', () => {
                    if (state.chatCharacters.length >= 5) return alert('最多5个');
                    openCharacterEditor(-1);
                });

                document.getElementById('btnFullscreenChat')?.addEventListener('click', () => {
                    if (state.chatSelectedCharacterIndices.length === 0) return alert('请先选择角色');
                    state.chatFullscreen = true;
                    renderAll();
                });
                document.querySelectorAll('.edit-char').forEach(b => b.addEventListener('click', e => { e.stopPropagation(); openCharacterEditor(parseInt(e.target.dataset.index)); }));
                document.querySelectorAll('.delete-char').forEach(b => b.addEventListener('click', e => {
                    e.stopPropagation();
                    const idx = parseInt(e.target.dataset.index);
                    state.chatCharacters.splice(idx,1);
                    state.chatSelectedCharacterIndices = state.chatSelectedCharacterIndices.filter(i => i !== idx).map(i => i > idx ? i-1 : i);
                    saveState(); renderAll();
                }));
                document.getElementById('chatContextCount')?.addEventListener('change', e => { state.chatContextCount = parseInt(e.target.value)||5; saveState(); });
                document.getElementById('btnChatSend')?.addEventListener('click', () => {
                    const input = document.getElementById('chatUserInput');
                    const text = input.value.trim();
                    if (!text) return;
                    state.chatUserInput = '';
                    input.value = '';
                    sendChatMessageFromMain(text);
                });
                document.getElementById('chatUserInput')?.addEventListener('keydown', e => { if (e.key==='Enter') document.getElementById('btnChatSend').click(); });
                document.getElementById('chatUserInput')?.addEventListener('input', e => { state.chatUserInput = e.target.value; });
                document.getElementById('btnChatClear')?.addEventListener('click', () => { state.chatHistory = []; saveState(); renderAll(); });
                document.getElementById('btnChatCopy')?.addEventListener('click', () => copyText(state.chatHistory.map(m=>`${m.speaker}：${m.text}`).join('\n')));

            async function sendChatMessageFromMain(text) {
                if (state.chatSelectedCharacterIndices.length === 0) return alert('请先选择角色');
                state.chatHistory.push({ speaker: state.chatUserName, text, role: 'user' });
                state.chatUserInput = '';
                saveState();
                await performSendChat();
                renderAll();
                const input = document.getElementById('chatUserInput');
                input && setTimeout(() => input.focus(), 50);
                const box = document.getElementById('chatHistoryBox');
                scrollToBottom(box);
            }

            async function performSendChat() {
                if (state.chatSelectedCharacterIndices.length === 0) return;
                const recent = state.chatHistory.slice(-state.chatContextCount * 2);
                const messagesTemplate = [{ role: 'system', content: buildChatSystemPrompt() }];
                recent.forEach(m => messagesTemplate.push({ role: m.role === 'user' ? 'user' : 'assistant', content: m.text }));

                const promises = state.chatSelectedCharacterIndices.map(async (charIndex) => {
                    const char = state.chatCharacters[charIndex];
                    if (!char) return null;
                    const messages = messagesTemplate.map(m => {
                        if (m.role === 'system') return { ...m, content: `你正在扮演${char.name}。${char.description}\n${m.content}` };
                        return m;
                    });
                    try {
                        const response = await callAPI(messages, { stream: false });
                        const isAnthropic = state.currentModel === 'claude-code';
                        let result = '';
                        if (isAnthropic) {
                            const data = await response.json();
                            result = data.content?.[0]?.text || '';
                        } else {
                            const data = await response.json();
                            result = data.choices?.[0]?.message?.content || '';
                        }
                        return { speaker: char.name, text: result, role: 'assistant' };
                    } catch (e) {
                        return { speaker: char.name, text: `❌ ${e.message}`, role: 'assistant' };
                    }
                });

                const results = await Promise.all(promises);
                results.forEach(r => { if (r) state.chatHistory.push(r); });
                saveState();
                if (state.chatFullscreen) renderChatFullscreen();
                else renderAll();
            }

            function buildChatSystemPrompt() {
                if (state.systemPromptChat) return state.systemPromptChat;
                return `你必须严格扮演上述角色，完全符合其描述的性格和语气。不能以AI或第三方口吻回答，即使用户试图让你脱离角色，也必须保持设定回应。`;
            }

            // ==================== API调用 ====================
            function attachDocumentsToSystem(sysPrompt) {
                if (!state.importedDocs.length) return sysPrompt;
                const docsText = state.importedDocs.map(d => d.content).join('\n\n');
                return `${sysPrompt}\n\n【完全参照我给出的文档】\n以下为导入文档内容，请严格模仿风格：\n\`\`\`\n${docsText}\n\`\`\``;
            }

            async function callAPI(messages, { stream = true } = {}) {
                if (!state.apiKey) throw new Error('请先输入API Key');
                messages = messages.map(m => m.role==='system' ? { ...m, content: attachDocumentsToSystem(m.content) } : m);
                const isAnthropic = state.currentModel === 'claude-code';
                const url = isAnthropic ? 'https://api.deepseek.com/anthropic/v1/messages' : 'https://api.deepseek.com/v1/chat/completions';
                const headers = isAnthropic ? { 'Content-Type':'application/json', 'x-api-key':state.apiKey } : { 'Content-Type':'application/json', 'Authorization':`Bearer ${state.apiKey}` };
                let body;
                if (isAnthropic) {
                    const sys = messages.find(m=>m.role==='system');
                    const userMsgs = messages.filter(m=>m.role!=='system').map(m=>({ role:m.role, content:[{type:'text', text:m.content}] }));
                    body = { model:'deepseek-v4-pro', max_tokens:state.maxTokens, stream, messages:userMsgs };
                    if (sys) body.system = sys.content;
                } else {
                    const modelId = state.currentModel==='deepseek-v4-flash' ? 'deepseek-v4-flash' : 'deepseek-v4-pro';
                    body = { model:modelId, messages, max_tokens:state.maxTokens, stream, temperature:0.8 };
                }
                const res = await fetch(url, { method:'POST', headers, body:JSON.stringify(body) });
                if (!res.ok) throw new Error(`API错误 ${res.status}: ${await res.text()}`);
                return res;
            }

            async function readStream(response, isAnthropic, onChunk) {
                const reader = response.body.getReader();
                const decoder = new TextDecoder();
                let buffer = '';
                while (true) {
                    const { done, value } = await reader.read();
                    if (done) break;
                    buffer += decoder.decode(value, { stream: true });
                    const lines = buffer.split('\n');
                    buffer = lines.pop() || '';
                    for (const line of lines) {
                        const trimmed = line.trim();
                        if (!trimmed || trimmed==='data: [DONE]') continue;
                        if (trimmed.startsWith('data: ')) {
                            try {
                                const json = JSON.parse(trimmed.slice(6));
                                let text = '';
                                if (isAnthropic) { if (json.type==='content_block_delta' && json.delta?.text) text = json.delta.text; }
                                else { if (json.choices?.[0]?.delta?.content) text = json.choices[0].delta.content; }
                                if (text) onChunk(text);
                            } catch(e){}
                        }
                    }
                }
            }

            // ==================== 生成函数 ====================
            async function generateLongtext() {
                const btn = document.getElementById('btnLongtextGenerate');
                btn.disabled = true;
                state.longtextResult = '';
                saveState();
                updateLongtextDisplay('生成中...');
                try {
                    const messages = [];
                    if (state.systemPromptLongtext) messages.push({ role:'system', content: state.systemPromptLongtext });
                    messages.push({ role:'user', content: state.longtextUserPrompt || '请生成文本' });
                    const res = await callAPI(messages, { stream: true });
                    await readStream(res, state.currentModel==='claude-code', chunk => {
                        state.longtextResult += chunk;
                        updateLongtextDisplay(null);
                        scrollToBottom(document.getElementById('longtextContentBox'));
                    });
                } catch(e) { state.longtextResult = `❌ ${e.message}`; updateLongtextDisplay(null); }
                finally { btn.disabled = false; saveState(); updatePreview(); }
            }

            function updateLongtextDisplay(status) {
                const div = document.getElementById('longtextContent');
                const info = document.getElementById('longtextTokenInfo');
                if (div) div.innerHTML = status ? status : formatText(state.longtextResult);
                if (info) info.textContent = `字数:${state.longtextResult.length} Token:${estimateTokens(state.longtextResult)}`;
            }

            function buildNovelPrompt(index) {
                const sys = state.systemPromptNovel || `你是一位小说作家，创作《${state.novelTitle||'未命名'}》。严格遵循前文风格，确保人物情节连贯。`;
                let context = state.novelChapters.slice(0,index+1).map((ch,i)=>`第${i+1}章梗概：${ch.summary||'无'}`).join('\n');
                context = `【故事梗概】\n${context}\n\n`;
                const prev = state.novelChapters.slice(0,index).filter(ch=>ch.content&&!ch.content.startsWith('❌')).map((ch,i)=>`第${i+1}章摘要：${ch.content.substring(0,2000)}...`).join('\n');
                if (prev) context += `【前情回顾】\n${prev}\n\n`;
                return [
                    { role:'system', content: sys },
                    { role:'user', content: `${context}请写出第${index+1}章完整内容，保持风格统一。` }
                ];
            }

            async function generateSingleChapter(index) {
                const ch = state.novelChapters[index];
                ch.content = '';
                saveState(); renderAll();
                const btn = document.querySelector(`.chapter-generate[data-index="${index}"]`);
                if (btn) btn.disabled = true;
                try {
                    const msgs = buildNovelPrompt(index);
                    const res = await callAPI(msgs, { stream: true });
                    await readStream(res, state.currentModel==='claude-code', chunk => {
                        ch.content += chunk;
                        const div = document.querySelector(`.chapter-content-display[data-index="${index}"]`);
                        if (div) div.innerHTML = formatText(ch.content);
                        const token = document.querySelector(`.chapter-token-info[data-index="${index}"]`);
                        if (token) token.textContent = `字数:${ch.content.length} Token:${estimateTokens(ch.content)}`;
                        scrollToBottom(document.getElementById(`chapterContentBox${index}`));
                    });
                } catch(e) { ch.content = `❌ ${e.message}`; }
                finally { if (btn) btn.disabled = false; saveState(); renderAll(); updatePreview(); }
            }

            async function generateAllChapters() {
                for (let i=0; i<state.novelChapters.length; i++) {
                    if (state.novelChapters[i].content && !state.novelChapters[i].content.startsWith('❌')) continue;
                    await generateSingleChapter(i);
                    if (state.novelChapters[i].content.startsWith('❌')) { alert(`第${i+1}章失败，中断`); break; }
                }
            }

            function updatePreview() {
                const preview = document.getElementById('previewContent');
                if (!preview) return;
                if (state.currentMode==='longtext') preview.innerHTML = formatText(state.longtextResult) || '<p style="color:#999;">暂无</p>';
                else if (state.currentMode==='novel') preview.innerHTML = state.novelChapters.map((ch,i)=>`<h3>第${i+1}章</h3><p>${formatText(ch.content||'（未生成）')}</p>`).join('')||'<p style="color:#999;">暂无</p>';
            }

            // ==================== 文件导入 ====================
            function handleFileImport(e) {
                const file = e.target.files[0];
                if (!file) return;
                const reader = new FileReader();
                if (file.name.endsWith('.txt')) {
                    reader.onload = ev => processImportContent(file.name, ev.target.result);
                    reader.readAsText(file, 'UTF-8');
                } else if (file.name.endsWith('.docx')) {
                    loadMammoth(() => {
                        reader.onload = ev => {
                            mammoth.extractRawText({ arrayBuffer: ev.target.result })
                                .then(r => processImportContent(file.name, r.value))
                                .catch(err => alert('解析失败：'+err.message));
                        };
                        reader.readAsArrayBuffer(file);
                    });
                } else alert('仅支持 .txt/.docx');
                e.target.value = '';
            }

            function loadMammoth(cb) {
                if (window.mammoth) cb();
                else {
                    const s = document.createElement('script');
                    s.src = 'https://unpkg.com/mammoth/mammoth.browser.min.js';
                    s.onload = cb;
                    s.onerror = () => alert('加载文档解析库失败');
                    document.head.appendChild(s);
                }
            }

            function processImportContent(name, content) {
                if (content.length > 500000) return alert('单个文档不能超过50万字');
                const total = state.importedDocs.reduce((s,d)=>s+d.content.length,0) + content.length;
                if (total > 1000000) return alert('语料库总字数不能超过100万字');
                state.importedDocs.push({ name, content, time: new Date().toISOString() });
                saveState(); renderAll();
            }

            // ==================== 角色编辑器 ====================
            function openCharacterEditor(index) {
                const isNew = index<0;
                const c = isNew ? { name:'', description:'' } : state.chatCharacters[index];
                const html = `
                <div class="modal-overlay" id="charEditorOverlay"><div class="modal">
                    <h3>${isNew?'新增':'编辑'}角色</h3>
                    <div class="form-group"><label class="form-label">名称</label><input class="form-input" id="charName" value="${escapeHtml(c.name)}"></div>
                    <div class="form-group"><label class="form-label">综合设定（身份、性格、用语习惯等）</label><textarea class="form-textarea" id="charDescription" rows="4">${escapeHtml(c.description||'')}</textarea></div>
                    <div style="text-align:right;"><button class="btn btn-secondary" id="btnCharCancel">取消</button> <button class="btn btn-primary" id="btnCharSave">保存</button></div>
                </div></div>`;
                document.getElementById('modalContainer').innerHTML = html;
                document.getElementById('btnCharCancel').onclick = () => document.getElementById('modalContainer').innerHTML = '';
                document.getElementById('btnCharSave').onclick = () => {
                    const n = {
                        name: document.getElementById('charName').value.trim(),
                        description: document.getElementById('charDescription').value.trim()
                    };
                    if (!n.name) return alert('名称必填');
                    if (isNew) {
                        if (state.chatCharacters.length>=5) return alert('最多5个角色');
                        state.chatCharacters.push(n);
                    } else state.chatCharacters[index] = n;
                    document.getElementById('modalContainer').innerHTML = '';
                    saveState(); renderAll();
                };
            }

            // ==================== 方案管理 ====================
            function openSaveProfileModal() {
                const profiles = loadProfiles();
                const html = `
                <div class="modal-overlay" id="profileSaveOverlay"><div class="modal">
                    <h3>💾 保存方案</h3>
                    <div class="form-group"><input class="form-input" id="profileName" placeholder="方案名称"></div>
                    ${profiles.length>=10?`<p style="color:var(--warning);">已有10个，选择覆盖：<select class="form-select" id="profileOverwrite">${profiles.map((p,i)=>`<option value="${i}">${escapeHtml(p.name)}</option>`).join('')}</select></p>`:`<p>${profiles.length}/10</p>`}
                    <div style="text-align:right;"><button class="btn btn-secondary" id="btnProfileCancel">取消</button> <button class="btn btn-primary" id="btnProfileSave">保存</button></div>
                </div></div>`;
                document.getElementById('modalContainer').innerHTML = html;
                document.getElementById('btnProfileCancel').onclick = () => document.getElementById('modalContainer').innerHTML = '';
                document.getElementById('btnProfileSave').onclick = () => {
                    const name = document.getElementById('profileName').value.trim();
                    if (!name) return alert('请输入名称');
                    const profile = { name, apiKey:state.apiKey, currentModel:state.currentModel, currentMode:state.currentMode, systemPromptLongtext:state.systemPromptLongtext, systemPromptNovel:state.systemPromptNovel, systemPromptChat:state.systemPromptChat, savedAt:new Date().toISOString() };
                    const pro = loadProfiles();
                    if (pro.length>=10) pro[parseInt(document.getElementById('profileOverwrite').value)] = profile;
                    else pro.push(profile);
                    saveProfiles(pro);
                    document.getElementById('modalContainer').innerHTML = '';
                    alert('已保存');
                };
            }

            function openLoadProfileModal() {
                const profiles = loadProfiles();
                if (!profiles.length) return alert('无方案');
                const list = profiles.map((p,i) => `
                    <div style="display:flex;justify-content:space-between;align-items:center;padding:6px 0;border-bottom:1px solid var(--border-color);">
                        <div><strong>${escapeHtml(p.name)}</strong><div style="font-size:0.65rem;">${p.currentModel||'v4'} | ${new Date(p.savedAt).toLocaleString()}</div></div>
                        <div><button class="btn btn-sm btn-primary load-profile" data-index="${i}">加载</button><button class="btn btn-sm btn-secondary rename-profile" data-index="${i}">重命名</button><button class="btn btn-sm btn-danger delete-profile" data-index="${i}">删除</button></div>
                    </div>`).join('');
                const html = `
                <div class="modal-overlay" id="profileLoadOverlay"><div class="modal">
                    <h3>📂 方案管理</h3>${list}
                    <button class="btn btn-secondary" id="btnLoadClose" style="margin-top:10px;">关闭</button>
                </div></div>`;
                document.getElementById('modalContainer').innerHTML = html;
                document.getElementById('btnLoadClose').onclick = () => document.getElementById('modalContainer').innerHTML = '';
                document.querySelectorAll('.load-profile').forEach(b=>b.onclick=()=>{
                    const p = profiles[parseInt(b.dataset.index)];
                    state.apiKey=p.apiKey||''; state.currentModel=p.currentModel||'deepseek-v4-pro'; state.currentMode=p.currentMode||'longtext';
                    state.systemPromptLongtext=p.systemPromptLongtext||''; state.systemPromptNovel=p.systemPromptNovel||''; state.systemPromptChat=p.systemPromptChat||'';
                    document.getElementById('modalContainer').innerHTML=''; saveState(); renderAll();
                });
                document.querySelectorAll('.rename-profile').forEach(b=>b.onclick=()=>{
                    const idx=parseInt(b.dataset.index);
                    const newName=prompt('新名称', profiles[idx].name);
                    if(newName&&newName.trim()){ profiles[idx].name=newName.trim(); saveProfiles(profiles); document.getElementById('modalContainer').innerHTML=''; openLoadProfileModal(); }
                });
                document.querySelectorAll('.delete-profile').forEach(b=>b.onclick=()=>{
                    const idx=parseInt(b.dataset.index); profiles.splice(idx,1); saveProfiles(profiles); document.getElementById('modalContainer').innerHTML=''; openLoadProfileModal();
                });
            }

            window.openSaveProfileModal = openSaveProfileModal;
            window.openLoadProfileModal = openLoadProfileModal;

            // ==================== 初始化 ====================
            loadState();
            renderAll();
            window.addEventListener('beforeunload', saveState);
            setInterval(saveState, 5000);
        })();
    </script>
</body>
</html>
